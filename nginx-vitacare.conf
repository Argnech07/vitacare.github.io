server {
    listen 80;
    server_name api.vqvsystem.com v.vqvsystem.com;
    
    # Logs
    access_log /var/log/nginx/vitacare-access.log;
    error_log /var/log/nginx/vitacare-error.log;

    # Proxy para el backend FastAPI
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Redirección HTTP a HTTPS (después de instalar SSL)
    # listen 443 ssl; # Descomentar después de instalar certbot
}

# Configuración SSL (generar con: certbot --nginx -d v.vqvsystem.com)
# Certbot agregará automáticamente la configuración SSL aquí
