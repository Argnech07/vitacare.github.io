# ============================================
# VitaCare Backend - Configuración para Render.com
# ============================================

services:
  - type: web
    name: vitacare-backend
    env: python
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vitacare-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: vitacare-static
    env: static
    staticPublishPath: ./uploads
    plan: free

databases:
  - name: vitacare-db
    plan: free
    databaseName: vitacare
    user: vitacare
